<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nextdoor Moderator Guidelines</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #1f2937;
      line-height: 1.7;
    }
    header {
      background: #111827;
      color: #f9fafb;
      padding: 16px 32px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header .brand {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #4b5563;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    #content {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    #loading { color: #6b7280; padding: 40px 0; text-align: center; }
    #error { color: #c62828; padding: 40px 0; text-align: center; }

    /* Markdown rendering */
    .md h1 { font-size: 22px; font-weight: 800; color: #111827; margin: 32px 0 10px; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; }
    .md h2 { font-size: 17px; font-weight: 700; color: #111827; margin: 24px 0 8px; }
    .md h3 { font-size: 14px; font-weight: 700; color: #374151; margin: 18px 0 6px; }
    .md p  { margin: 8px 0; font-size: 14px; }
    .md ul, .md ol { margin: 8px 0 8px 24px; font-size: 14px; }
    .md li { margin: 4px 0; }
    .md strong { font-weight: 700; color: #111827; }
    .md em { color: #6b7280; font-style: italic; }
    .md hr { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
    .md blockquote { border-left: 3px solid #d1d5db; padding-left: 14px; color: #6b7280; margin: 10px 0; font-style: italic; }
    .md code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; color: #374151; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="brand">ND Moderator</div>
      <h1>Guidelines sent to LLM</h1>
    </div>
  </header>
  <div id="content">
    <div id="loading">Loading guidelines…</div>
  </div>
  <script src="guidelines.js"></script>
</body>
</html>
