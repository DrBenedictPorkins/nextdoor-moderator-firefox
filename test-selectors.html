<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Validator - Nextdoor Moderator Extension</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 4px;
        }
        .success {
            border-left: 4px solid #4CAF50;
        }
        .error {
            border-left: 4px solid #f44336;
        }
        .code {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 5px 10px 0;
        }
        button:hover {
            background: #45a049;
        }
        .info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nextdoor Moderator Extension - Selector Validator</h1>
        
        <div class="info">
            <strong>Instructions:</strong> 
            <ol>
                <li>Load the HTML file from <code>resources/Moderation—Nextdoor.html</code></li>
                <li>Click "Test Selectors" to validate all selectors work correctly</li>
                <li>Results will show what content was found for each selector</li>
            </ol>
        </div>

        <div>
            <button onclick="loadHTMLFile()">1. Load HTML File</button>
            <button onclick="testSelectors()" id="testBtn" disabled>2. Test Selectors</button>
            <input type="file" id="fileInput" accept=".html" style="display:none;" onchange="handleFileSelect(event)">
        </div>

        <div id="results"></div>
    </div>

    <script>
        let htmlContent = '';

        const SELECTORS = {
            originalPost: '[data-testid="post-body"]',
            originalPostContent: '[data-testid="post-body"] [data-testid="styled-text-wrapper"] [data-testid="styled-text"]',
            commentContainer: '[data-testid="comment-detail"]',
            commentBody: '[data-testid="comment-detail-body"]',
            commentContent: '[data-testid="truncate-container"] [data-testid="styled-text"]',
            reportIndicator: '.blocks-19xz1ve',
            authorName: 'a[href*="detail_author"], a[href*="detail_commenter"]',
        };

        function loadHTMLFile() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                htmlContent = e.target.result;
                document.getElementById('testBtn').disabled = false;
                showMessage('File loaded successfully! Click "Test Selectors" to continue.', 'success');
            };
            reader.readAsText(file);
        }

        function showMessage(msg, type) {
            const results = document.getElementById('results');
            results.innerHTML = `<div class="result ${type}">${msg}</div>`;
        }

        function testSelectors() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Test Results</h2>';

            // Create a temporary container to parse the HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;

            // Test each selector
            const tests = [
                {
                    name: 'Original Post Container',
                    selector: SELECTORS.originalPost,
                    expectMultiple: false
                },
                {
                    name: 'Original Post Content',
                    selector: SELECTORS.originalPostContent,
                    expectMultiple: false,
                    showText: true
                },
                {
                    name: 'Comment Containers',
                    selector: SELECTORS.commentContainer,
                    expectMultiple: true
                },
                {
                    name: 'Comment Content Elements',
                    selector: SELECTORS.commentContent,
                    expectMultiple: true,
                    showText: true,
                    limit: 5
                },
                {
                    name: 'Report Indicators (Flagged Comments)',
                    selector: SELECTORS.reportIndicator,
                    expectMultiple: false
                },
                {
                    name: 'Author Name Links',
                    selector: SELECTORS.authorName,
                    expectMultiple: true,
                    showText: true,
                    limit: 10
                }
            ];

            tests.forEach(test => {
                const section = document.createElement('div');
                section.className = 'test-section';

                const elements = tempDiv.querySelectorAll(test.selector);
                const found = elements.length;
                const success = found > 0;

                let html = `<h3>${test.name}</h3>`;
                html += `<div class="result ${success ? 'success' : 'error'}">`;
                html += `<strong>Selector:</strong> <code>${test.selector}</code><br>`;
                html += `<strong>Found:</strong> ${found} element(s)<br>`;

                if (success && test.showText) {
                    html += '<strong>Sample Content:</strong><ul>';
                    const limit = test.limit || 3;
                    Array.from(elements).slice(0, limit).forEach((el, idx) => {
                        const text = el.textContent.trim().substring(0, 100);
                        html += `<li>[${idx + 1}] ${text}${text.length >= 100 ? '...' : ''}</li>`;
                    });
                    html += '</ul>';
                }

                html += '</div>';
                section.innerHTML = html;
                results.appendChild(section);
            });

            // Special test: Find flagged comments by traversing from report indicator
            const reportSection = document.createElement('div');
            reportSection.className = 'test-section';
            reportSection.innerHTML = '<h3>Flagged Comment Detection (Special Test)</h3>';

            const reportIndicators = tempDiv.querySelectorAll(SELECTORS.reportIndicator);
            let flaggedComments = [];
            
            reportIndicators.forEach(indicator => {
                let commentContainer = indicator.closest(SELECTORS.commentContainer);
                if (commentContainer) {
                    flaggedComments.push(commentContainer);
                }
            });

            let flaggedHtml = `<div class="result ${flaggedComments.length > 0 ? 'success' : 'error'}">`;
            flaggedHtml += `<strong>Report Indicators Found:</strong> ${reportIndicators.length}<br>`;
            flaggedHtml += `<strong>Flagged Comments Found:</strong> ${flaggedComments.length}<br>`;
            
            if (flaggedComments.length > 0) {
                flaggedHtml += '<strong>Flagged Comment Details:</strong><ul>';
                flaggedComments.forEach((comment, idx) => {
                    const author = comment.querySelector(SELECTORS.authorName);
                    const content = comment.querySelector(SELECTORS.commentContent);
                    flaggedHtml += `<li>[${idx + 1}] Author: ${author ? author.textContent : 'Unknown'}<br>`;
                    flaggedHtml += `Content: ${content ? content.textContent.substring(0, 80) : 'N/A'}...</li>`;
                });
                flaggedHtml += '</ul>';
            }
            
            flaggedHtml += '</div>';
            reportSection.innerHTML += flaggedHtml;
            results.appendChild(reportSection);
        }
    </script>
</body>
</html>
